spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: spring-ai-bootcamp-basic
  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      chat:
        options:
          model: gpt-4.1-nano
          temperature: 0.1
      embedding:
        options:
          model: text-embedding-3-small
